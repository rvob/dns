<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitor de Sites</title>

<style>

:root{
  --bg:#0f1115;
  --card:#171a21;
  --border:#2d3442;
  --text:#f5f7fb;
  --muted:#9aa4b2;
  --green:#00e676;
  --red:#ff5252;
  --orange:#ffb300;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:16px;
  background:linear-gradient(180deg,#0b0d11,#121722);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}

.container{
  max-width:1200px;
  margin:auto;
}

.card{
  background:rgba(23,26,33,.96);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

h1{
  margin:0 0 10px;
  color:var(--green);
  font-size:clamp(1.4rem,4vw,2.2rem);
}

.subtitle{
  color:var(--muted);
  margin-bottom:14px;
}

.btn-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

button{
  border:none;
  border-radius:12px;
  padding:12px 18px;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
  transition:.2s;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.btn-primary{
  background:#00c853;
}

.btn-primary:hover{
  background:#00b24a;
}

.btn-secondary{
  background:#374151;
}

.btn-secondary:hover{
  background:#4b5563;
}

.progress-wrap{
  margin-top:16px;
}

.meta{
  color:var(--muted);
  font-size:.92rem;
  margin-bottom:8px;
}

.progress{
  height:10px;
  background:#202733;
  border-radius:999px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00c853);
  transition:width .2s;
}

.stats{
  margin-top:18px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.stat{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

.label{
  color:var(--muted);
  font-size:.85rem;
}

.value{
  margin-top:5px;
  font-size:1.4rem;
  font-weight:bold;
}

.table-wrap{
  margin-top:20px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

th{
  background:#1e232d;
  position:sticky;
  top:0;
}

.online{
  color:var(--green);
  font-weight:bold;
}

.offline{
  color:var(--red);
  font-weight:bold;
}

.protocol{
  color:var(--orange);
}

.domain{
  word-break:break-all;
}

@media(max-width:768px){

  table,thead,tbody,tr,td{
    display:block;
    width:100%;
  }

  thead{
    display:none;
  }

  tbody{
    display:grid;
    gap:10px;
  }

  tr{
    background:#171a21;
    border:1px solid var(--border);
    border-radius:12px;
    padding:8px 0;
  }

  td{
    border:none;
    display:flex;
    justify-content:space-between;
    gap:10px;
  }

  td::before{
    content:attr(data-label);
    color:var(--muted);
    font-weight:bold;
  }

}

</style>
</head>
<body>

<div class="container">

  <div class="card">

    <h1>Monitor de Sites</h1>

    <div class="subtitle">
      Os testes são feitos usando a internet e DNS do próprio usuário conectado.
    </div>

    <div class="btn-group">

      <button id="btnCheck" class="btn-primary">
        Verificar Agora
      </button>

      <button id="btnClear" class="btn-secondary">
        Limpar Cache
      </button>

    </div>

    <div class="progress-wrap">

      <div class="meta" id="progressText">
        Aguardando verificação...
      </div>

      <div class="progress">
        <div class="bar" id="progressBar"></div>
      </div>

    </div>

    <div class="stats">

      <div class="stat">
        <div class="label">Total</div>
        <div class="value" id="total">0</div>
      </div>

      <div class="stat">
        <div class="label">Online</div>
        <div class="value" id="online">0</div>
      </div>

      <div class="stat">
        <div class="label">Offline</div>
        <div class="value" id="offline">0</div>
      </div>

    </div>

    <div class="meta" id="lastUpdate" style="margin-top:14px">
      Última atualização: -
    </div>

  </div>

  <div class="card table-wrap">

    <table>

      <thead>
        <tr>
          <th>Domínio</th>
          <th>Status</th>
          <th>Protocolo</th>
          <th>Tempo</th>
          <th>Verificado em</th>
        </tr>
      </thead>

      <tbody id="results"></tbody>

    </table>

  </div>

</div>

<script>

const urls = [

  "8yca8t.live",
  "clubneymar.com",
  "clubthief.me",
  "fundaocapao.com",
  "gudeboi.com",
  "interblack.pro",
  "nymcsus.autos",
  "ocvtab.info",
  "roscoe.club",
  "ueropqe.com",
  "uabckiac.com"

];

const STORAGE_KEY = "monitor_cache_v7";

const TIMEOUT_MS = 6000;

const CONCURRENCY = 5;

const $ = id => document.getElementById(id);

function updateProgress(done,total){

  const percent = total
    ? Math.round((done / total) * 100)
    : 0;

  $("progressBar").style.width =
    percent + "%";

  $("progressText").textContent =
    done < total
      ? `Verificando ${done} de ${total} (${percent}%)`
      : `Concluído (${total})`;

}

function testImage(url){

  return new Promise(resolve => {

    const img = new Image();

    const start = performance.now();

    let finished = false;

    const timeout = setTimeout(() => {

      if(finished) return;

      finished = true;

      img.src = "";

      resolve({
        success:false
      });

    }, TIMEOUT_MS);

    img.onload = () => {

      if(finished) return;

      finished = true;

      clearTimeout(timeout);

      resolve({

        success:true,

        time:Math.round(
          performance.now() - start
        )

      });

    };

    img.onerror = () => {

      if(finished) return;

      finished = true;

      clearTimeout(timeout);

      resolve({

        success:true,

        time:Math.round(
          performance.now() - start
        )

      });

    };

    img.src =
      url +
      "/favicon.ico?_=" +
      Date.now();

  });

}

async function checkUrl(domain){

  const https = await testImage(
    "https://" + domain
  );

  if(https.success){

    return {

      url:domain,

      status:"ONLINE",

      protocol:"HTTPS",

      className:"online",

      timeMs:https.time

    };

  }

  const http = await testImage(
    "http://" + domain
  );

  if(http.success){

    return {

      url:domain,

      status:"ONLINE",

      protocol:"HTTP",

      className:"online",

      timeMs:http.time

    };

  }

  return {

    url:domain,

    status:"OFFLINE",

    protocol:"-",

    className:"offline",

    timeMs:Infinity

  };

}

async function runPool(items,worker,onProgress){

  const results = new Array(items.length);

  let index = 0;

  let done = 0;

  async function runner(){

    while(true){

      const current = index++;

      if(current >= items.length){
        break;
      }

      results[current] =
        await worker(items[current]);

      done++;

      onProgress(done, items.length);

    }

  }

  const workers = Array.from({

    length:Math.min(CONCURRENCY, items.length)

  }, () => runner());

  await Promise.all(workers);

  return results;

}

function render(results){

  const now =
    new Date().toLocaleString("pt-BR");

  $("results").innerHTML = results.map(r => `

    <tr>

      <td data-label="Domínio">
        <span class="domain">
          ${r.url}
        </span>
      </td>

      <td data-label="Status">
        <span class="${r.className}">
          ${r.status}
        </span>
      </td>

      <td data-label="Protocolo">
        <span class="protocol">
          ${r.protocol}
        </span>
      </td>

      <td data-label="Tempo">
        ${
          Number.isFinite(r.timeMs)
            ? r.timeMs + " ms"
            : "-"
        }
      </td>

      <td data-label="Verificado">
        ${now}
      </td>

    </tr>

  `).join("");

  const online =
    results.filter(r =>
      r.status === "ONLINE"
    ).length;

  $("total").textContent =
    results.length;

  $("online").textContent =
    online;

  $("offline").textContent =
    results.length - online;

  $("lastUpdate").textContent =
    "Última atualização: " + now;

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(results)
  );

}

async function checkAll(){

  $("btnCheck").disabled = true;

  $("btnClear").disabled = true;

  $("results").innerHTML = `

    <tr>
      <td colspan="5">
        Verificando sites...
      </td>
    </tr>

  `;

  updateProgress(0, urls.length);

  const results = await runPool(
    urls,
    checkUrl,
    updateProgress
  );

  results.sort((a,b) => {

    if(
      a.status === "ONLINE" &&
      b.status !== "ONLINE"
    ){
      return -1;
    }

    if(
      a.status !== "ONLINE" &&
      b.status === "ONLINE"
    ){
      return 1;
    }

    return a.timeMs - b.timeMs;

  });

  render(results);

  $("btnCheck").disabled = false;

  $("btnClear").disabled = false;

}

function clearCache(){

  localStorage.removeItem(STORAGE_KEY);

  $("results").innerHTML = "";

  $("progressBar").style.width = "0%";

  $("progressText").textContent =
    "Cache limpo.";

  $("total").textContent = "0";

  $("online").textContent = "0";

  $("offline").textContent = "0";

  $("lastUpdate").textContent =
    "Última atualização: -";

}

function restoreCache(){

  try{

    const cache = JSON.parse(
      localStorage.getItem(STORAGE_KEY)
    );

    if(cache){

      render(cache);

      updateProgress(
        cache.length,
        cache.length
      );

    }

  }catch(e){

    console.log(e);

  }

}

window.addEventListener("load", () => {

  restoreCache();

  if(!localStorage.getItem(STORAGE_KEY)){

    checkAll();

  }

});

$("btnCheck").addEventListener(
  "click",
  checkAll
);

$("btnClear").addEventListener(
  "click",
  clearCache
);

</script>

</body>
</html>
