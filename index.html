<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitor Lite PRO</title>

<style>

:root{
  --bg:#0d1117;
  --panel:#161b22;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --green:#3fb950;
  --red:#f85149;
  --yellow:#d29922;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Consolas,monospace;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-bottom:15px;
}

button{
  border:none;
  background:var(--green);
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-family:inherit;
}

button:hover{
  opacity:.9;
}

button.secondary{
  background:#30363d;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:15px;
  color:var(--muted);
}

.stats b{
  color:var(--text);
}

.progress{
  width:100%;
  height:8px;
  background:#21262d;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:20px;
}

.bar{
  height:100%;
  width:0%;
  background:var(--green);
  transition:.2s;
}

.table-wrap{
  overflow:auto;
  border:1px solid var(--border);
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

th{
  background:#161b22;
  color:var(--muted);
  font-weight:normal;
  text-align:left;
  padding:14px;
  border-bottom:1px solid var(--border);
}

td{
  padding:12px 14px;
  border-bottom:1px solid #21262d;
}

tr:hover{
  background:#161b22;
}

.online{
  color:var(--green);
  font-weight:bold;
}

.offline{
  color:var(--red);
  font-weight:bold;
}

.testing{
  color:var(--yellow);
}

.domain{
  word-break:break-all;
}

.footer{
  margin-top:15px;
  color:var(--muted);
  font-size:.9rem;
}

@media(max-width:768px){

  body{
    padding:10px;
  }

}

</style>
</head>
<body>

<div class="container">

  <div class="topbar">

    <button id="btnCheck">
      Verificar Agora
    </button>

    <button id="btnClear" class="secondary">
      Limpar Cache
    </button>

  </div>

  <div class="stats">

    <div>Total: <b id="total">0</b></div>

    <div>Online: <b id="online">0</b></div>

    <div>Offline: <b id="offline">0</b></div>

    <div id="statusText">Aguardando...</div>

  </div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="table-wrap">

    <table>

      <thead>
        <tr>
          <th>DOMÍNIO</th>
          <th>STATUS</th>
          <th>TEMPO</th>
        </tr>
      </thead>

      <tbody id="tbody"></tbody>

    </table>

  </div>

  <div class="footer" id="footer">
    Última atualização: -
  </div>

</div>

<script>

const urls = [

  "8yca8t.live",
  "clubneymar.com",
  "clubthief.me",
  "fundaocapao.com",
  "gudeboi.com",
  "interblack.pro",
  "nymcsus.autos",
  "ocvtab.info",
  "roscoe.club",
  "ueropqe.com",
  "uabckiac.com"

];

const TIMEOUT = 6000;

const CONCURRENCY = 5;

const STORAGE_KEY = "monitor_lite_pro_v3";

const tbody = document.getElementById("tbody");

const bar = document.getElementById("bar");

const totalEl = document.getElementById("total");

const onlineEl = document.getElementById("online");

const offlineEl = document.getElementById("offline");

const footer = document.getElementById("footer");

const statusText = document.getElementById("statusText");

const btnCheck = document.getElementById("btnCheck");

const btnClear = document.getElementById("btnClear");

function renderInitial(){

  tbody.innerHTML = urls.map(domain => `

    <tr id="row-${domain}">

      <td class="domain">
        http://${domain}
      </td>

      <td class="testing">
        TESTANDO...
      </td>

      <td>
        -
      </td>

    </tr>

  `).join("");

  totalEl.textContent = urls.length;

}

function updateStats(results){

  const online =
    results.filter(r => r.status === "ONLINE").length;

  const offline =
    results.filter(r => r.status === "OFFLINE").length;

  onlineEl.textContent = online;

  offlineEl.textContent = offline;

}

function updateProgress(done,total){

  const percent =
    Math.round((done / total) * 100);

  bar.style.width = percent + "%";

  statusText.textContent =
    `Verificando ${done}/${total} (${percent}%)`;

}

function testSite(domain){

  return new Promise(resolve => {

    const img = new Image();

    const start = performance.now();

    let finished = false;

    const timeout = setTimeout(() => {

      if(finished) return;

      finished = true;

      img.src = "";

      resolve({
        online:false
      });

    }, TIMEOUT);

    img.onload = () => {

      if(finished) return;

      finished = true;

      clearTimeout(timeout);

      resolve({

        online:true,

        time:Math.round(
          performance.now() - start
        )

      });

    };

    img.onerror = () => {

      if(finished) return;

      finished = true;

      clearTimeout(timeout);

      /*
        erro significa:
        servidor respondeu
      */

      resolve({

        online:true,

        time:Math.round(
          performance.now() - start
        )

      });

    };

    img.src =
      "http://" +
      domain +
      "/favicon.ico?_=" +
      Date.now();

  });

}

async function checkDomain(domain){

  const result =
    await testSite(domain);

  if(result.online){

    return {

      domain:"http://" + domain,

      status:"ONLINE",

      time:result.time

    };

  }

  return {

    domain:"http://" + domain,

    status:"OFFLINE",

    time:"-"

  };

}

function updateRow(result){

  const row =
    document.getElementById(
      "row-" +
      result.domain.replace("http://","")
    );

  if(!row) return;

  row.innerHTML = `

    <td class="domain">
      ${result.domain}
    </td>

    <td class="${
      result.status === "ONLINE"
      ? "online"
      : "offline"
    }">
      ${result.status}
    </td>

    <td>
      ${
        result.time === "-"
        ? "-"
        : result.time + " ms"
      }
    </td>

  `;

}

function renderSorted(results){

  tbody.innerHTML = "";

  results.forEach(result => {

    tbody.innerHTML += `

      <tr>

        <td class="domain">
          ${result.domain}
        </td>

        <td class="${
          result.status === "ONLINE"
          ? "online"
          : "offline"
        }">
          ${result.status}
        </td>

        <td>
          ${
            result.time === "-"
            ? "-"
            : result.time + " ms"
          }
        </td>

      </tr>

    `;

  });

}

async function runChecks(){

  btnCheck.disabled = true;

  btnClear.disabled = true;

  renderInitial();

  let done = 0;

  let results = [];

  async function worker(domain){

    const result =
      await checkDomain(domain);

    results.push(result);

    updateRow(result);

    done++;

    updateProgress(done, urls.length);

    updateStats(results);

  }

  let index = 0;

  async function runner(){

    while(index < urls.length){

      const current = urls[index++];

      await worker(current);

    }

  }

  const runners = [];

  for(
    let i = 0;
    i < CONCURRENCY;
    i++
  ){
    runners.push(runner());
  }

  await Promise.all(runners);

  /*
    organiza pelo menor ping
  */

  results.sort((a,b) => {

    if(a.status === "OFFLINE") return 1;

    if(b.status === "OFFLINE") return -1;

    return a.time - b.time;

  });

  renderSorted(results);

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(results)
  );

  footer.textContent =
    "Última atualização: " +
    new Date().toLocaleString("pt-BR");

  statusText.textContent =
    "Concluído";

  btnCheck.disabled = false;

  btnClear.disabled = false;

}

function restoreCache(){

  const cache =
    localStorage.getItem(STORAGE_KEY);

  if(!cache) return;

  const results = JSON.parse(cache);

  renderSorted(results);

  updateStats(results);

  totalEl.textContent = results.length;

  bar.style.width = "100%";

  statusText.textContent =
    "Cache carregado";

}

btnCheck.onclick = runChecks;

btnClear.onclick = () => {

  localStorage.removeItem(STORAGE_KEY);

  tbody.innerHTML = "";

  totalEl.textContent = "0";

  onlineEl.textContent = "0";

  offlineEl.textContent = "0";

  bar.style.width = "0%";

  statusText.textContent =
    "Cache limpo";

  footer.textContent =
    "Última atualização: -";

};

restoreCache();

if(!localStorage.getItem(STORAGE_KEY)){

  runChecks();

}

</script>

</body>
</html>
