<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitor Lite PRO</title>

<style>

:root{
  --bg:#0d1117;
  --panel:#161b22;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --green:#3fb950;
  --red:#f85149;
  --yellow:#d29922;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Consolas,monospace;
  padding:12px;
}

.container{
  max-width:1100px;
  margin:auto;
}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

button{
  border:none;
  background:var(--green);
  color:#fff;
  padding:11px 15px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-family:inherit;
  font-size:.95rem;
}

button.secondary{
  background:#30363d;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-bottom:14px;
}

.stat{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
}

.stat-label{
  color:var(--muted);
  font-size:.8rem;
}

.stat-value{
  margin-top:5px;
  font-size:1.2rem;
  font-weight:bold;
}

.progress{
  width:100%;
  height:8px;
  background:#21262d;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:15px;
}

.bar{
  height:100%;
  width:0%;
  background:var(--green);
  transition:.2s;
}

.status-text{
  margin-bottom:10px;
  color:var(--muted);
  font-size:.9rem;
}

.table-wrap{
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#161b22;
  color:var(--muted);
  text-align:left;
  padding:12px;
  font-weight:normal;
  font-size:.9rem;
  border-bottom:1px solid var(--border);
}

td{
  padding:12px;
  border-bottom:1px solid #21262d;
  font-size:.92rem;
}

tr:last-child td{
  border-bottom:none;
}

.online{
  color:var(--green);
  font-weight:bold;
}

.offline{
  color:var(--red);
  font-weight:bold;
}

.testing{
  color:var(--yellow);
}

.domain{
  word-break:break-all;
}

.footer{
  margin-top:12px;
  color:var(--muted);
  font-size:.85rem;
}

/* MOBILE */

@media(max-width:700px){

  body{
    padding:8px;
  }

  .topbar{
    flex-direction:column;
  }

  button{
    width:100%;
  }

  table,
  thead,
  tbody,
  tr,
  td{
    display:block;
    width:100%;
  }

  thead{
    display:none;
  }

  tbody{
    display:grid;
    gap:10px;
  }

  tr{
    background:var(--panel);
    border-bottom:none;
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }

  td{
    display:flex;
    justify-content:space-between;
    gap:10px;
    border-bottom:1px solid #21262d;
  }

  td:last-child{
    border-bottom:none;
  }

  td::before{
    font-weight:bold;
    color:var(--muted);
  }

  td:nth-child(1)::before{
    content:"Domínio";
  }

  td:nth-child(2)::before{
    content:"Status";
  }

  td:nth-child(3)::before{
    content:"Tempo";
  }

}

</style>
</head>
<body>

<div class="container">

  <div class="topbar">

    <button id="btnCheck">
      Verificar Agora
    </button>

    <button id="btnClear" class="secondary">
      Limpar Cache
    </button>

  </div>

  <div class="stats">

    <div class="stat">
      <div class="stat-label">TOTAL</div>
      <div class="stat-value" id="total">0</div>
    </div>

    <div class="stat">
      <div class="stat-label">ONLINE</div>
      <div class="stat-value" id="online">0</div>
    </div>

    <div class="stat">
      <div class="stat-label">OFFLINE</div>
      <div class="stat-value" id="offline">0</div>
    </div>

  </div>

  <div class="status-text" id="statusText">
    Aguardando...
  </div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="table-wrap">

    <table>

      <thead>
        <tr>
          <th>DOMÍNIO</th>
          <th>STATUS</th>
          <th>TEMPO</th>
        </tr>
      </thead>

      <tbody id="tbody"></tbody>

    </table>

  </div>

  <div class="footer" id="footer">
    Última atualização: -
  </div>

</div>

<script>

const urls = [

  "8yca8t.live",
  "clubneymar.com",
  "clubthief.me",
  "fundaocapao.com",
  "gudeboi.com",
  "interblack.pro",
  "nymcsus.autos",
  "ocvtab.info",
  "roscoe.club",
  "ueropqe.com",
  "uabckiac.com"

];

const TIMEOUT = 6000;

const CONCURRENCY = 5;

const STORAGE_KEY = "monitor_lite_mobile_v1";

const tbody = document.getElementById("tbody");

const bar = document.getElementById("bar");

const totalEl = document.getElementById("total");

const onlineEl = document.getElementById("online");

const offlineEl = document.getElementById("offline");

const footer = document.getElementById("footer");

const statusText = document.getElementById("statusText");

const btnCheck = document.getElementById("btnCheck");

const btnClear = document.getElementById("btnClear");

function renderInitial(){

  tbody.innerHTML = urls.map(domain => `

    <tr id="row-${domain}">

      <td class="domain">
        http://${domain}
      </td>

      <td class="testing">
        TESTANDO...
      </td>

      <td>
        -
      </td>

    </tr>

  `).join("");

  totalEl.textContent = urls.length;

}

function updateStats(results){

  const online =
    results.filter(r => r.status === "ONLINE").length;

  const offline =
    results.filter(r => r.status === "OFFLINE").length;

  onlineEl.textContent = online;

  offlineEl.textContent = offline;

}

function updateProgress(done,total){

  const percent =
    Math.round((done / total) * 100);

  bar.style.width = percent + "%";

  statusText.textContent =
    `Verificando ${done}/${total} (${percent}%)`;

}

function testSite(domain){

  return new Promise(resolve => {

    const img = new Image();

    const start = performance.now();

    let finished = false;

    const timeout = setTimeout(() => {

      if(finished) return;

      finished = true;

      img.src = "";

      resolve({
        online:false
      });

    }, TIMEOUT);

    img.onload = () => {

      if(finished) return;

      finished = true;

      clearTimeout(timeout);

      resolve({

        online:true,

        time:Math.round(
          performance.now() - start
        )

      });

    };

    img.onerror = () => {

      if(finished) return;

      finished = true;

      clearTimeout(timeout);

      resolve({

        online:true,

        time:Math.round(
          performance.now() - start
        )

      });

    };

    img.src =
      "http://" +
      domain +
      "/favicon.ico?_=" +
      Date.now();

  });

}

async function checkDomain(domain){

  const result =
    await testSite(domain);

  if(result.online){

    return {

      domain:"http://" + domain,

      status:"ONLINE",

      time:result.time

    };

  }

  return {

    domain:"http://" + domain,

    status:"OFFLINE",

    time:"-"

  };

}

function renderSorted(results){

  tbody.innerHTML = "";

  results.forEach(result => {

    tbody.innerHTML += `

      <tr>

        <td class="domain">
          ${result.domain}
        </td>

        <td class="${
          result.status === "ONLINE"
          ? "online"
          : "offline"
        }">
          ${result.status}
        </td>

        <td>
          ${
            result.time === "-"
            ? "-"
            : result.time + " ms"
          }
        </td>

      </tr>

    `;

  });

}

async function runChecks(){

  btnCheck.disabled = true;

  btnClear.disabled = true;

  renderInitial();

  let done = 0;

  let results = [];

  async function worker(domain){

    const result =
      await checkDomain(domain);

    results.push(result);

    done++;

    updateProgress(done, urls.length);

    updateStats(results);

  }

  let index = 0;

  async function runner(){

    while(index < urls.length){

      const current = urls[index++];

      await worker(current);

    }

  }

  const runners = [];

  for(let i = 0; i < CONCURRENCY; i++){

    runners.push(runner());

  }

  await Promise.all(runners);

  results.sort((a,b) => {

    if(a.status === "OFFLINE") return 1;

    if(b.status === "OFFLINE") return -1;

    return a.time - b.time;

  });

  renderSorted(results);

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(results)
  );

  footer.textContent =
    "Última atualização: " +
    new Date().toLocaleString("pt-BR");

  statusText.textContent =
    "Concluído";

  btnCheck.disabled = false;

  btnClear.disabled = false;

}

function restoreCache(){

  const cache =
    localStorage.getItem(STORAGE_KEY);

  if(!cache) return;

  const results = JSON.parse(cache);

  renderSorted(results);

  updateStats(results);

  totalEl.textContent = results.length;

  bar.style.width = "100%";

  statusText.textContent =
    "Cache carregado";

}

btnCheck.onclick = runChecks;

btnClear.onclick = () => {

  localStorage.removeItem(STORAGE_KEY);

  tbody.innerHTML = "";

  totalEl.textContent = "0";

  onlineEl.textContent = "0";

  offlineEl.textContent = "0";

  bar.style.width = "0%";

  statusText.textContent =
    "Cache limpo";

  footer.textContent =
    "Última atualização: -";

};

restoreCache();

if(!localStorage.getItem(STORAGE_KEY)){

  runChecks();

}

</script>

</body>
</html>
